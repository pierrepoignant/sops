{# Reusable SOP search bar with live results. Include on any SOP page.
   Pages may define an element with id="browse" which is hidden while a live
   query is active. #}
<form class="sop-search" method="get" action="{{ url_for('help.index') }}" autocomplete="off">
    <i class="fas fa-search search-ico"></i>
    <input type="text" name="q" id="q" class="form-control" value="{{ q or '' }}"
           placeholder="Rechercher dans les SOP…">
</form>
<div id="liveResults"></div>

<style>
    .sop-search { max-width: 640px; margin: 0 auto 18px; position: relative; }
    .sop-search input { padding: 12px 16px 12px 42px; border-radius: 30px; border: 1px solid var(--pim-border-strong); font-size: 15px; }
    .sop-search .search-ico { position: absolute; left: 16px; top: 13px; color: var(--pim-text-muted); }
    #liveResults .result-card { background: white; border: 1px solid var(--pim-border); border-radius: 10px; padding: 14px 18px; margin-bottom: 12px; max-width: 760px; margin-left:auto; margin-right:auto; }
    #liveResults .result-card a { color: var(--pim-link); font-weight: 600; text-decoration: none; font-size: 15px; }
    #liveResults .result-card .cat { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--pim-text-muted); }
    #liveResults .result-card .snippet { color: var(--pim-text-secondary); font-size: 13px; margin-top: 4px; }
    #liveResults mark { background: rgba(var(--pim-primary-rgb), 0.18); padding: 0 2px; }
</style>

<script>
(function () {
    const qInput = document.getElementById('q');
    const live = document.getElementById('liveResults');
    if (!qInput || qInput.dataset.bound) return;
    qInput.dataset.bound = '1';
    const browse = document.getElementById('browse');
    let timer = null;
    function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    qInput.addEventListener('input', () => {
        clearTimeout(timer);
        const q = qInput.value.trim();
        if (q.length < 2) { live.innerHTML = ''; if (browse) browse.style.display = ''; return; }
        timer = setTimeout(async () => {
            const resp = await fetch('{{ url_for("help.api_search") }}?q=' + encodeURIComponent(q));
            const data = await resp.json();
            if (browse) browse.style.display = 'none';
            if (!data.results.length) { live.innerHTML = '<p class="text-muted text-center">Aucun résultat.</p>'; return; }
            live.innerHTML = data.results.map(r => `
                <div class="result-card">
                    <div class="cat">${esc(r.category)}</div>
                    <a href="/help/article/${encodeURIComponent(r.slug)}">${esc(r.title)}</a>
                    <div class="snippet">${r.snippet}</div>
                </div>`).join('');
        }, 180);
    });
})();
</script>
