name: Deploy SOP

on:
  push:
    branches: [main]

env:
  REGISTRY: 8ie06lx5.c1.gra9.container-registry.ovh.net
  # Harbor image path: <registry>/<project>/<repository>
  # NOTE: pushed into the existing `stores` Harbor project (repo `sops`) because
  # the CI robot account has push rights there. Move to a dedicated `sops`
  # project once it exists + the robot is granted push access.
  IMAGE: 8ie06lx5.c1.gra9.container-registry.ovh.net/stores/sops

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to OVH Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OVH_REGISTRY_USER }}
          password: ${{ secrets.OVH_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create / update K8s sops-secrets
        run: |
          kubectl delete secret sops-secrets --ignore-not-found
          echo '${{ secrets.SOPS_SECRETS_JSON }}' | \
            python3 -c "
          import json, sys, subprocess
          data = json.load(sys.stdin)
          args = ['kubectl', 'create', 'secret', 'generic', 'sops-secrets']
          for k, v in data.items():
              args.append(f'--from-literal={k}={v}')
          subprocess.run(args, check=True)
          "

      - name: Render deployment manifest
        run: |
          sed -i "s|__IMAGE__|${{ env.IMAGE }}|g" kubernetes/deployment.yaml

      - name: Deploy application
        run: |
          kubectl apply -f kubernetes/deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout restart deployment/sops
          kubectl rollout status deployment/sops --timeout=5m
