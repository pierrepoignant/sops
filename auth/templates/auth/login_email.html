<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion par code · SOP {{ brand_name }}</title>
    <link rel="icon" href="{{ url_for('static', filename='brand/' ~ current_brand ~ '/logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='design-tokens.css') }}">
    <style>
        body { background: linear-gradient(135deg, rgba(var(--pim-primary-rgb), 0.10) 0%, rgba(var(--pim-primary-rgb), 0.22) 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; font-family: var(--pim-font-sans); }
        .login-card { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.12);
                      padding: 44px 40px; max-width: 420px; width: 100%; text-align: center; }
        .login-logo { height: 60px; width:auto; max-width: 180px; object-fit: contain; margin-bottom: 16px; }
    </style>
</head>
<body data-brand="{{ current_brand }}">
    <div class="login-card">
        <img class="login-logo" src="{{ brand_logo }}" alt="{{ brand_name }}">
        <h5 class="mb-1" style="color: var(--pim-primary);">Connexion par code</h5>
        <p class="text-muted mb-4" style="font-size: 14px;">Recevez un code de connexion à 6 chiffres par e-mail.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} py-2" style="font-size: 13px;">{{ message }}</div>
            {% endfor %}{% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login_email_request') }}">
            <input type="email" name="email" class="form-control mb-3" required
                   placeholder="votre.email@exemple.com" value="{{ email or '' }}">
            <button type="submit" class="btn btn-primary w-100 mb-3"><i class="fas fa-paper-plane me-2"></i>Recevoir un code</button>
        </form>
        <a href="{{ url_for('auth.login') }}" class="text-muted" style="font-size: 13px; text-decoration: none;">&larr; Autres options de connexion</a>
    </div>
</body>
</html>
